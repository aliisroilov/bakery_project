services:
  postgres:
    image: postgres:16-alpine
    container_name: bakery_v2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bakery_v2
      POSTGRES_USER: bakery
      POSTGRES_PASSWORD: bakery_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakery -d bakery_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bakery_v2_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
