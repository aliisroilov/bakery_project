name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/frontend/package-lock.json

      - name: Build frontend
        working-directory: v2/frontend
        run: |
          npm ci
          npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /home/deploy/bakery_v2

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing Python dependencies..."
            source v2/backend/venv/bin/activate
            pip install -r v2/backend/requirements.txt --quiet

            echo "==> Running migrations..."
            cd v2/backend
            python manage.py migrate --noinput

            echo "==> Collecting static files..."
            python manage.py collectstatic --noinput
            deactivate

            echo "==> Reloading gunicorn..."
            kill -HUP $(systemctl show bakery-v2-gunicorn -p MainPID --value)

            echo "==> Backend deploy complete!"

      - name: Push frontend dist to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            v2/frontend/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/deploy/bakery_v2/v2/frontend/dist/

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            systemctl is-active bakery-v2-gunicorn \
              && echo "Gunicorn OK" \
              || (echo "Gunicorn FAILED" && exit 1)
